<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formulario de Garantías · Sekunet</title>
  <style>
    /* Formulario de Garantías Styles - Exact Match to Image */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #e6f3ff;
    }

    .form-container {
      background: #e6f3ff;
      min-height: 100vh;
      padding: 0;
    }

    /* Header Styles - Exact Match */
    .form-header {
      background: #1e40af;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo svg {
      width: 35px;
      height: 35px;
    }

    .brand-name {
      color: white;
      font-size: 24px;
      font-weight: bold;
      font-family: Arial, sans-serif;
    }

    .header-info {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
    }

    .date-info, .consecutive-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .date-label, .consecutive-label {
      color: white;
      font-size: 12px;
      font-weight: bold;
      font-family: Arial, sans-serif;
    }

    .date-value, .consecutive-value {
      color: #fbbf24;
      font-size: 14px;
      font-weight: bold;
      font-family: Arial, sans-serif;
    }

    .form-title {
      background: #1e40af;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
      font-family: Arial, sans-serif;
      margin: 0;
    }

    /* Form Content - Exact Match */
    .warranty-form {
      background: #e6f3ff;
      padding: 20px;
    }

    .form-section {
      margin-bottom: 25px;
    }

    .form-section:last-child {
      margin-bottom: 0;
    }

    .section-title {
      background: #1e40af;
      color: white;
      padding: 10px 15px;
      font-size: 16px;
      font-weight: bold;
      font-family: Arial, sans-serif;
      margin: 0 0 15px 0;
      border-left: 5px solid #f59e0b;
    }

    .form-row {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      min-width: 200px;
      flex: 1;
    }

    .form-group.full-width {
      width: 100%;
    }

    .form-label {
      background: #f59e0b;
      color: white;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: bold;
      font-family: Arial, sans-serif;
      text-transform: uppercase;
      margin-bottom: 5px;
      border: none;
    }

    .form-input, .form-textarea {
      background: white;
      border: 2px solid #1e40af;
      padding: 8px 12px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      border-radius: 0;
    }

    .form-input:focus, .form-textarea:focus {
      outline: none;
      border-color: #f59e0b;
    }

    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }

    /* Top Section Special Styling */
    .top-section {
      background: rgba(255, 255, 255, 0.3);
      padding: 15px;
      border: 1px solid #1e40af;
    }

    /* Bottom Section Special Styling */
    .bottom-section {
      background: rgba(255, 255, 255, 0.3);
      padding: 15px;
      border: 1px solid #1e40af;
    }

    /* Buttons - Exact Match */
    .form-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 2px solid #1e40af;
    }

    .btn {
      padding: 12px 30px;
      border: none;
      font-size: 14px;
      font-weight: bold;
      font-family: Arial, sans-serif;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 0;
    }

    .btn-primary {
      background: #1e40af;
      color: white;
      border: 2px solid #1e40af;
    }

    .btn-primary:hover {
      background: #2563eb;
    }

    .btn-secondary {
      background: #64748b;
      color: white;
      border: 2px solid #64748b;
    }

    .btn-secondary:hover {
      background: #475569;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .form-header {
        flex-direction: column;
        gap: 10px;
        text-align: center;
      }
      
      .header-info {
        align-items: center;
      }
      
      .form-row {
        flex-direction: column;
        gap: 10px;
      }
      
      .form-buttons {
        flex-direction: column;
        align-items: center;
      }
      
      .btn {
        width: 100%;
        max-width: 200px;
      }
    }
  </style>
</head>
<body>

  <div class="form-container">
    <!-- HEADER -->
    <div class="form-header">
      <div class="logo-section">
        <div class="logo">
          <svg width="35" height="35" viewBox="0 0 32 32" fill="none">
            <rect width="32" height="32" rx="8" fill="#1B4F9C"/>
            <path d="M8 16L14 22L24 10" stroke="#F7B24B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="brand-name">SEKUNET</span>
        </div>
        <div class="header-info">
          <div class="date-info">
            <span class="date-label">FECHA:</span>
            <span class="date-value" id="currentDate"></span>
          </div>
          <div class="consecutive-info">
            <span class="consecutive-label">CONSECUTIVO:</span>
            <span class="consecutive-value" id="consecutiveNumber"></span>
          </div>
        </div>
      </div>
    </div>

    <h1 class="form-title">FORMULARIO DE GARANTÍAS</h1>

    <!-- FORM CONTENT -->
    <form class="warranty-form" id="warrantyForm">
      <!-- TOP SECTION -->
      <div class="form-section top-section">
        <div class="form-row">
          <div class="form-group">
            <label for="tipo" class="form-label">TIPO:</label>
            <input type="text" id="tipo" name="tipo" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="categoria" class="form-label">CATEGORIA</label>
            <input type="text" id="categoria" name="categoria" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="boleta" class="form-label">BOLETA Nº:</label>
            <input type="text" id="boleta" name="boleta" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="motivo" class="form-label">MOTIVO</label>
            <input type="text" id="motivo" name="motivo" class="form-input" required>
          </div>
        </div>
      </div>

      <!-- CLIENT INFORMATION -->
      <div class="form-section">
        <h2 class="section-title">INFORMACIÓN DEL CLIENTE</h2>
        <div class="form-row">
          <div class="form-group">
            <label for="ticket" class="form-label">TICKET N°:</label>
            <input type="text" id="ticket" name="ticket" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="sede" class="form-label">SEDE</label>
            <input type="text" id="sede" name="sede" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="nombre" class="form-label">NOMBRE:</label>
            <input type="text" id="nombre" name="nombre" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="factura" class="form-label">FACTURA N°:</label>
            <input type="text" id="factura" name="factura" class="form-input" required>
          </div>
        </div>
      </div>

      <!-- PRODUCT INFORMATION -->
      <div class="form-section">
        <h2 class="section-title">INFORMACIÓN DEL PRODUCTO</h2>
        <div class="form-row">
          <div class="form-group">
            <label for="cantidad" class="form-label">CANTIDAD:</label>
            <input type="number" id="cantidad" name="cantidad" class="form-input" min="1" required>
          </div>
          <div class="form-group">
            <label for="fechaCompra" class="form-label">FECHA DE COMPRA</label>
            <input type="date" id="fechaCompra" name="fechaCompra" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="marca" class="form-label">MARCA:</label>
            <input type="text" id="marca" name="marca" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="codigo" class="form-label">CÓDIGO DE ARTÍCULO</label>
            <input type="text" id="codigo" name="codigo" class="form-input" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="serie" class="form-label">SERIE:</label>
            <input type="text" id="serie" name="serie" class="form-input">
          </div>
          <div class="form-group full-width">
            <label for="descripcion" class="form-label">DESCRIPCIÓN</label>
            <textarea id="descripcion" name="descripcion" class="form-textarea" rows="3" required></textarea>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group full-width">
            <label for="falla" class="form-label">FALLA</label>
            <textarea id="falla" name="falla" class="form-textarea" rows="3" required></textarea>
          </div>
        </div>
      </div>

      <!-- BOTTOM SECTION -->
      <div class="form-section bottom-section">
        <div class="form-row">
          <div class="form-group">
            <label for="solicitado" class="form-label">SOLICITADO POR:</label>
            <input type="text" id="solicitado" name="solicitado" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="aprobado" class="form-label">APROBADO POR:</label>
            <input type="text" id="aprobado" name="aprobado" class="form-input" value="Jorge Montenegro" required>
          </div>
        </div>
      </div>

      <!-- BUTTONS -->
      <div class="form-buttons">
        <button type="submit" class="btn btn-primary">GUARDAR</button>
        <button type="button" class="btn btn-secondary" id="clearBtn">LIMPIAR</button>
      </div>
    </form>
  </div>

  <script>
    // Formulario de Garantías JavaScript
    document.addEventListener('DOMContentLoaded', function() {
      // Initialize form
      initializeForm();
      
      // Set up event listeners
      setupEventListeners();
    });

    function initializeForm() {
      // Set current date
      setCurrentDate();
      
      // Generate consecutive number
      generateConsecutiveNumber();
    }

    function setCurrentDate() {
      const dateElement = document.getElementById('currentDate');
      const today = new Date();
      const options = { year: 'numeric', month: 'long', day: 'numeric' };
      const formattedDate = today.toLocaleDateString('es-ES', options);
      dateElement.textContent = formattedDate;
    }

    function generateConsecutiveNumber() {
      const consecutiveElement = document.getElementById('consecutiveNumber');
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, '0');
      
      // Generate random 3-digit number
      const randomNum = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
      
      // Format: YYYYMM-XXX
      const consecutive = `${year}${month}-${randomNum}`;
      consecutiveElement.textContent = consecutive;
    }

    function setupEventListeners() {
      const form = document.getElementById('warrantyForm');
      const clearBtn = document.getElementById('clearBtn');
      
      // Form submission
      form.addEventListener('submit', handleFormSubmit);
      
      // Clear button
      clearBtn.addEventListener('click', clearForm);
    }

    function handleFormSubmit(e) {
      e.preventDefault();
      
      const form = e.target;
      const submitBtn = form.querySelector('button[type="submit"]');
      
      // Validate all fields
      if (!validateForm()) {
        showNotification('Por favor, complete todos los campos requeridos', 'error');
        return;
      }
      
      // Show loading state
      submitBtn.textContent = 'GUARDANDO...';
      submitBtn.disabled = true;
      
      // Get form data
      const formData = getFormData();
      
      // Simulate saving to database
      setTimeout(() => {
        console.log('Form data:', formData);
        showNotification('Formulario guardado exitosamente', 'success');
        clearForm();
        generateConsecutiveNumber(); // Generate new consecutive number
        
        // Reset button
        submitBtn.textContent = 'GUARDAR';
        submitBtn.disabled = false;
      }, 1500);
    }

    function validateForm() {
      const form = document.getElementById('warrantyForm');
      const requiredFields = form.querySelectorAll('[required]');
      let isValid = true;
      
      requiredFields.forEach(field => {
        if (!field.value.trim()) {
          isValid = false;
          field.style.borderColor = '#ef4444';
        } else {
          field.style.borderColor = '#1e40af';
        }
      });
      
      return isValid;
    }

    function getFormData() {
      const form = document.getElementById('warrantyForm');
      const formData = new FormData(form);
      const data = {};
      
      // Add metadata
      data.fecha_creacion = new Date().toISOString();
      data.consecutivo = document.getElementById('consecutiveNumber').textContent;
      data.fecha_formulario = document.getElementById('currentDate').textContent;
      
      // Convert FormData to object
      for (let [key, value] of formData.entries()) {
        data[key] = value;
      }
      
      return data;
    }

    function clearForm() {
      const form = document.getElementById('warrantyForm');
      form.reset();
      
      // Reset field colors
      const inputs = form.querySelectorAll('.form-input, .form-textarea');
      inputs.forEach(input => {
        input.style.borderColor = '#1e40af';
      });
      
      // Keep approved by value
      const aprobadoInput = document.getElementById('aprobado');
      if (aprobadoInput) {
        aprobadoInput.value = 'Jorge Montenegro';
      }
      
      showNotification('Formulario limpiado', 'info');
    }

    function showNotification(message, type = 'info') {
      // Remove existing notifications
      const existingNotification = document.querySelector('.notification');
      if (existingNotification) {
        existingNotification.remove();
      }
      
      // Create notification element
      const notification = document.createElement('div');
      notification.className = `notification notification-${type}`;
      notification.textContent = message;
      
      // Style notification
      const colors = {
        success: { bg: '#10b981', text: 'white' },
        error: { bg: '#ef4444', text: 'white' },
        info: { bg: '#3b82f6', text: 'white' }
      };
      
      notification.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        background: ${colors[type].bg};
        color: ${colors[type].text};
        padding: 12px 20px;
        border-radius: 4px;
        z-index: 1000;
        font-weight: bold;
        font-family: Arial, sans-serif;
      `;
      
      document.body.appendChild(notification);
      
      // Auto remove after 3 seconds
      setTimeout(() => {
        if (notification.parentNode) {
          notification.remove();
        }
      }, 3000);
    }
  </script>
</body>
</html>
