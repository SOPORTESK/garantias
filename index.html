<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Setup Admin · Sekunet</title>
  <style>
    body { font-family: sans-serif; background: #f5f4f2; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card { background: #fff; border-radius: 16px; padding: 2rem; max-width: 420px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,.12); }
    h2 { color: #D1411E; margin: 0 0 .25rem; font-size: 1.2rem; }
    p { color: #7a6e62; font-size: .85rem; margin: 0 0 1.5rem; }
    label { display: block; font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #7a6e62; margin-bottom: .3rem; }
    input { width: 100%; box-sizing: border-box; padding: .6rem .8rem; border: 1.5px solid #ddd; border-radius: 8px; font-size: .9rem; margin-bottom: 1rem; outline: none; }
    input:focus { border-color: #D1411E; }
    button { width: 100%; padding: .75rem; background: #D1411E; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .msg { margin-top: 1rem; padding: .75rem 1rem; border-radius: 8px; font-size: .85rem; display: none; }
    .msg.ok  { background: #d1fae5; color: #065f46; display: block; }
    .msg.err { background: #fee2e2; color: #991b1b; display: block; }
    .step { font-size: .78rem; color: #7a6e62; margin-top: .5rem; }
  </style>
</head>
<body>
<div class="card">
  <h2>⚙️ Crear usuario Admin</h2>
  <p>Usá esto una sola vez para registrar el administrador. Después podés borrar este archivo.</p>

  <label>Nombre</label>
  <input id="nombre" type="text" value="Cesar Andres" />

  <label>Apellido</label>
  <input id="apellido" type="text" value="Batista" />

  <label>Correo</label>
  <input id="email" type="email" value="cbatista@sekunet.com" />

  <label>Contraseña (mínimo 6 caracteres)</label>
  <input id="pass" type="password" placeholder="Tu contraseña" />

  <button id="btn" onclick="setup()">Crear / Actualizar Admin</button>
  <div class="msg" id="msg"></div>
  <div class="step" id="step"></div>
</div>

<script>
const SB_URL = 'https://jwlavcjwuhdydmusqskx.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp3bGF2Y2p3dWhkeWRtdXNxc2t4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwODM2OTcsImV4cCI6MjA5MDY1OTY5N30.bS1Uc-0m9teuxG2oKqAHMQ6vOr0HPoFwh49EYx3cROM';

function log(txt) { document.getElementById('step').textContent = txt; }
function ok(txt)  { const m = document.getElementById('msg'); m.className='msg ok';  m.textContent = txt; }
function err(txt) { const m = document.getElementById('msg'); m.className='msg err'; m.textContent = txt; }

async function setup() {
  const nombre   = document.getElementById('nombre').value.trim();
  const apellido = document.getElementById('apellido').value.trim();
  const email    = document.getElementById('email').value.trim();
  const pass     = document.getElementById('pass').value;
  const btn      = document.getElementById('btn');

  if (!nombre || !apellido || !email || !pass) { err('Completá todos los campos'); return; }
  if (pass.length < 6) { err('La contraseña debe tener al menos 6 caracteres'); return; }

  btn.disabled = true;
  document.getElementById('msg').className = 'msg';
  document.getElementById('step').textContent = '';

  let authToken = null;
  let userId    = null;

  // PASO 1: Intentar login (por si el usuario ya existe)
  log('Paso 1/3 · Verificando si el usuario ya existe…');
  try {
    const res = await fetch(SB_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const data = await res.json();
    if (res.ok && data.access_token) {
      authToken = data.access_token;
      userId    = data.user.id;
      log('Paso 1/3 · Usuario encontrado, iniciando sesión…');
    }
  } catch(e) {}

  // PASO 2: Si no pudo loguearse, registrar
  if (!authToken) {
    log('Paso 2/3 · Registrando nuevo usuario…');
    try {
      const res = await fetch(SB_URL + '/auth/v1/signup', {
        method: 'POST',
        headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password: pass, data: { nombre, apellido } })
      });
      const data = await res.json();
      if (!res.ok) { err('Error al registrar: ' + (data.error_description || data.msg || JSON.stringify(data))); btn.disabled=false; return; }

      // Si Supabase pide confirmación, hacer login igual
      if (!data.access_token) {
        log('Paso 2/3 · Intentando login post-registro…');
        const res2 = await fetch(SB_URL + '/auth/v1/token?grant_type=password', {
          method: 'POST',
          headers: { 'apikey': SB_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: pass })
        });
        const data2 = await res2.json();
        if (!res2.ok || !data2.access_token) {
          err('Usuario creado pero no se pudo iniciar sesión automáticamente. Confirmá el email en el dashboard de Supabase si es necesario, luego volvé a intentar.');
          btn.disabled = false; return;
        }
        authToken = data2.access_token;
        userId    = data2.user.id;
      } else {
        authToken = data.access_token;
        userId    = data.user.id;
      }
    } catch(e) { err('Error de red: ' + e.message); btn.disabled=false; return; }
  }

  // PASO 3: Crear/actualizar perfil como admin
  log('Paso 3/3 · Guardando perfil como administrador…');
  try {
    const res = await fetch(SB_URL + '/rest/v1/perfiles', {
      method: 'POST',
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + authToken,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates,return=minimal'
      },
      body: JSON.stringify({ id: userId, nombre, apellido, correo: email, rol: 'admin' })
    });
    if (!res.ok) {
      const t = await res.text();
      // Si falla por RLS, igual el usuario puede entrar (el código lo detecta por email)
      log('Perfil no guardado en tabla (puede ser RLS), pero el acceso admin igual funciona por el correo.');
    } else {
      log('');
    }
  } catch(e) { log('Advertencia al guardar perfil: ' + e.message); }

  ok('✅ Listo. Podés iniciar sesión en garantias_v9.html con ' + email);
  btn.disabled = false;
}
</script>
</body>
</html>
