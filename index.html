<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formulario de Garantías · Sekunet</title>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/formulario.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="8" fill="#1B4F9C"/>
          <path d="M8 16L14 22L24 10" stroke="#F7B24B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="brand-name">SEKUNET</span>
    </div>

    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item" data-page="dashboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="formulario.html" class="nav-item active" data-page="formulario">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Nuevo Formulario
      </a>
      <a href="definitivas.html" class="nav-item" data-page="definitivas">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Salidas Definitivas
      </a>
      <a href="temporales.html" class="nav-item" data-page="temporales">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Salidas Temporales
      </a>
      <a href="inventario.html" class="nav-item" data-page="inventario">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Inventario
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info" id="userInfo">
        <div class="user-avatar" id="userAvatar">?</div>
        <div class="user-details">
          <span class="user-name" id="userName">Cargando...</span>
          <span class="user-role">Técnico</span>
        </div>
      </div>
      <button class="btn-logout" id="logoutBtn" title="Cerrar sesión">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <div class="form-container">
      <!-- HEADER -->
      <div class="form-header">
        <div class="logo-section">
          <div class="logo">
            <svg width="40" height="40" viewBox="0 0 32 32" fill="none">
              <rect width="32" height="32" rx="8" fill="#1B4F9C"/>
              <path d="M8 16L14 22L24 10" stroke="#F7B24B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="brand-name">SEKUNET</span>
          </div>
          <div class="header-info">
            <div class="date-info">
              <span class="date-label">FECHA:</span>
              <span class="date-value" id="currentDate"></span>
            </div>
            <div class="consecutive-info">
              <span class="consecutive-label">CONSECUTIVO:</span>
              <span class="consecutive-value" id="consecutiveNumber"></span>
            </div>
          </div>
        </div>
        <h1 class="form-title">FORMULARIO DE GARANTÍAS</h1>
      </div>

      <!-- FORM CONTENT -->
      <form class="warranty-form" id="warrantyForm">
        <!-- TOP SECTION -->
        <div class="form-section top-section">
          <div class="form-row">
            <div class="form-group">
              <label for="tipo" class="form-label">TIPO:</label>
              <input type="text" id="tipo" name="tipo" class="form-input" required>
            </div>
            <div class="form-group">
              <label for="categoria" class="form-label">CATEGORIA</label>
              <input type="text" id="categoria" name="categoria" class="form-input" required>
            </div>
            <div class="form-group">
              <label for="boleta" class="form-label">BOLETA Nº:</label>
              <input type="text" id="boleta" name="boleta" class="form-input" required>
            </div>
            <div class="form-group">
              <label for="motivo" class="form-label">MOTIVO</label>
              <input type="text" id="motivo" name="motivo" class="form-input" required>
            </div>
          </div>
        </div>

        <!-- CLIENT INFORMATION -->
        <div class="form-section">
          <h2 class="section-title">INFORMACIÓN DEL CLIENTE</h2>
          <div class="form-row">
            <div class="form-group">
              <label for="ticket" class="form-label">TICKET N°:</label>
              <input type="text" id="ticket" name="ticket" class="form-input" required>
            </div>
            <div class="form-group">
              <label for="sede" class="form-label">SEDE</label>
              <input type="text" id="sede" name="sede" class="form-input" required>
            </div>
            <div class="form-group">
              <label for="nombre" class="form-label">NOMBRE:</label>
              <input type="text" id="nombre" name="nombre" class="form-input" required>
            </div>
            <div class="form-group">
              <label for="factura" class="form-label">FACTURA N°:</label>
              <input type="text" id="factura" name="factura" class="form-input" required>
            </div>
          </div>
        </div>

        <!-- PRODUCT INFORMATION -->
        <div class="form-section">
          <h2 class="section-title">INFORMACIÓN DEL PRODUCTO</h2>
          <div class="form-row">
            <div class="form-group">
              <label for="cantidad" class="form-label">CANTIDAD:</label>
              <input type="number" id="cantidad" name="cantidad" class="form-input" min="1" required>
            </div>
            <div class="form-group">
              <label for="fechaCompra" class="form-label">FECHA DE COMPRA</label>
              <input type="date" id="fechaCompra" name="fechaCompra" class="form-input" required>
            </div>
            <div class="form-group">
              <label for="marca" class="form-label">MARCA:</label>
              <input type="text" id="marca" name="marca" class="form-input" required>
            </div>
            <div class="form-group">
              <label for="codigo" class="form-label">CÓDIGO DE ARTÍCULO</label>
              <input type="text" id="codigo" name="codigo" class="form-input" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="serie" class="form-label">SERIE:</label>
              <input type="text" id="serie" name="serie" class="form-input">
            </div>
            <div class="form-group full-width">
              <label for="descripcion" class="form-label">DESCRIPCIÓN</label>
              <textarea id="descripcion" name="descripcion" class="form-textarea" rows="3" required></textarea>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group full-width">
              <label for="falla" class="form-label">FALLA</label>
              <textarea id="falla" name="falla" class="form-textarea" rows="3" required></textarea>
            </div>
          </div>
        </div>

        <!-- BOTTOM SECTION -->
        <div class="form-section bottom-section">
          <div class="form-row">
            <div class="form-group">
              <label for="solicitado" class="form-label">SOLICITADO POR:</label>
              <input type="text" id="solicitado" name="solicitado" class="form-input" required>
            </div>
            <div class="form-group">
              <label for="aprobado" class="form-label">APROBADO POR:</label>
              <input type="text" id="aprobado" name="aprobado" class="form-input" value="Jorge Montenegro" required>
            </div>
          </div>
        </div>

        <!-- BUTTONS -->
        <div class="form-buttons">
          <button type="submit" class="btn btn-primary">GUARDAR</button>
          <button type="button" class="btn btn-secondary" id="clearBtn">LIMPIAR</button>
        </div>
      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth-guard.js"></script>
  <script src="../js/formulario.js"></script>
</body>
</html>
