<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nuevo Registro · Sekunet</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #1B4F9C;
      --secondary: #0f172a;
      --amber: #F7B24B;
      --success: #10b981;
      --bg: #f8fafc;
      --card-bg: rgba(255, 255, 255, 0.8);
      --border: #e2e8f0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      margin: 0;
      display: flex;
      min-height: 100vh;
      color: var(--secondary);
    }

    /* Sidebar minimalista */
    .sidebar {
      width: 280px;
      background: white;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 2rem 1.5rem;
    }

    .brand {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 3rem;
    }

    .nav-link {
      text-decoration: none;
      color: #64748b;
      padding: 0.8rem 1rem;
      border-radius: 12px;
      margin-bottom: 0.5rem;
      transition: all 0.3s;
      font-weight: 500;
    }

    .nav-link:hover, .nav-link.active {
      background: #f1f5f9;
      color: var(--primary);
    }

    /* Contenedor Principal */
    .main-content {
      flex: 1;
      padding: 3rem;
      max-width: 1000px;
      margin: 0 auto;
    }

    header { margin-bottom: 2.5rem; }
    header h1 { font-family: 'Syne', sans-serif; font-size: 2.2rem; margin: 0; }
    header p { color: #64748b; margin-top: 0.5rem; }

    /* Estilo Bento Grid para el Formulario */
    .form-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      padding: 2rem;
      border-radius: 24px;
      border: 1px solid white;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
    }

    .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .form-group.full { grid-column: span 2; }

    label { font-size: 0.85rem; font-weight: 600; color: #475569; margin-left: 4px; }

    input, select, textarea {
      padding: 0.8rem 1rem;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-family: inherit;
      font-size: 1rem;
      background: white;
      transition: all 0.2s ease;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(27, 79, 156, 0.1);
      transform: translateY(-1px);
    }

    /* Botón con efecto moderno */
    .btn-submit {
      grid-column: span 2;
      background: var(--primary);
      color: white;
      border: none;
      padding: 1.2rem;
      border-radius: 16px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      margin-top: 1rem;
      box-shadow: 0 10px 15px -3px rgba(27, 79, 156, 0.3);
    }

    .btn-submit:hover {
      background: #153e7a;
      transform: translateY(-2px);
      box-shadow: 0 20px 25px -5px rgba(27, 79, 156, 0.4);
    }

    .btn-submit:active { transform: translateY(0); }

    /* Notificación de éxito */
    #toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--secondary);
      color: white;
      padding: 1rem 2rem;
      border-radius: 12px;
      display: none;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="brand">SEKUNET</div>
    <a href="index.html" class="nav-link">Dashboard</a>
    <a href="#" class="nav-link active">Nuevo Registro</a>
    <a href="#" class="nav-link">Inventario</a>
  </aside>

  <main class="main-content">
    <header>
      <h1>Nuevo Formulario</h1>
      <p>Ingresa los detalles de la salida de equipo para el control de garantías.</p>
    </header>

    <form id="registroForm" class="form-container">
      <div class="form-group">
        <label for="tipo">Tipo de Salida</label>
        <select id="tipo" required>
          <option value="definitiva">Definitiva</option>
          <option value="temporal">Temporal</option>
        </select>
      </div>

      <div class="form-group">
        <label for="cliente">Cliente / Empresa</label>
        <input type="text" id="cliente" placeholder="Ej: Corporativo ABC" required>
      </div>

      <div class="form-group">
        <label for="solicitado_por">Solicitado por</label>
        <input type="text" id="solicitado_por" placeholder="Nombre del técnico o encargado" required>
      </div>

      <div class="form-group">
        <label for="sede">Sede / Ubicación</label>
        <input type="text" id="sede" placeholder="Ej: San Pedro, San José" required>
      </div>

      <div class="form-group full">
        <label for="notas">Detalles del Equipo / Notas</label>
        <textarea id="notas" rows="4" placeholder="Especifique modelos, números de serie o motivo de la salida..."></textarea>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">Guardar Registro</button>
    </form>
    
    <div id="toast">¡Registro guardado con éxito!</div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // CONFIGURACIÓN DE SUPABASE
    const supabaseUrl = 'https://TU_PROYECTO.supabase.co';
    const supabaseKey = 'TU_ANON_KEY';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    const form = document.getElementById('registroForm');
    const btn = document.getElementById('submitBtn');
    const toast = document.getElementById('toast');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Bloquear botón para evitar doble envío
      btn.disabled = true;
      btn.innerText = 'Enviando...';

      const datos = {
        tipo: document.getElementById('tipo').value,
        cliente: document.getElementById('cliente').value,
        solicitado_por: document.getElementById('solicitado_por').value,
        sede: document.getElementById('sede').value,
        estado: 'pendiente' // Por defecto
      };

      try {
        const { error } = await supabase.from('registros').insert([datos]);

        if (error) throw error;

        // Éxito
        toast.style.display = 'block';
        form.reset();
        
        setTimeout(() => {
          toast.style.display = 'none';
          window.location.href = 'index.html'; // Regresar al dashboard
        }, 2500);

      } catch (err) {
        alert('Error al guardar: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.innerText = 'Guardar Registro';
      }
    });
  </script>
</body>
</html>
