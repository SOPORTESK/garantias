<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formulario de Garantías · Sekunet</title>
  <style>
    /* Design System - Exact Image Colors */
    :root {
      --primary-blue: #1B4F9C;
      --secondary-orange: #F7B24B;
      --light-blue-bg: #E6F3FF;
      --white: #FFFFFF;
      --black: #000000;
      
      /* Spacing System */
      --spacing-xs: 0.5rem;
      --spacing-sm: 0.75rem;
      --spacing-md: 1rem;
      --spacing-lg: 1.5rem;
      --spacing-xl: 2rem;
      --spacing-2xl: 3rem;
      
      /* Consistent Gaps */
      --gap-sm: 0.75rem;
      --gap-md: 1rem;
      --gap-lg: 1.5rem;
      --gap-xl: 2rem;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--light-blue-bg);
      min-height: 100vh;
      line-height: 1.6;
      color: var(--black);
    }

    .form-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1rem;
      animation: fadeInUp 0.6s ease-out;
    }

    /* Header - Exact Image Colors with Perfect Spacing */
    .form-header {
      background: #2c3e50;
      padding: var(--spacing-md) var(--spacing-xl);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid #1a252f;
    }

    .form-header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary-600), var(--secondary-500));
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: var(--gap-lg);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: var(--gap-md);
    }

    .logo svg {
      width: 48px;
      height: 48px;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
      transition: transform 0.3s ease;
    }

    .logo:hover svg {
      transform: scale(1.1) rotate(5deg);
    }

    .brand-name {
      color: var(--white);
      font-size: 1.75rem;
      font-weight: 800;
      font-family: Arial, sans-serif;
      letter-spacing: -0.025em;
    }

    .header-info {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: var(--gap-sm);
    }

    .date-info, .consecutive-info {
      display: flex;
      align-items: center;
      gap: var(--gap-sm);
      padding: var(--spacing-sm) var(--spacing-md);
      background: #34495e;
      border-radius: var(--spacing-xs);
      border: 1px solid #2c3e50;
    }

    .date-label, .consecutive-label {
      color: var(--white);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .date-value, .consecutive-value {
      color: var(--white);
      font-size: 0.875rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .form-title {
      background: var(--primary-blue);
      color: var(--white);
      text-align: center;
      padding: var(--spacing-lg);
      font-size: 20px;
      font-weight: bold;
      font-family: Arial, sans-serif;
      margin: 0;
      border-bottom: 3px solid var(--dark-blue);
    }

    .form-title::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .form-title:hover::before {
      left: 100%;
    }

    /* Modern Form Content with Uniform Spacing */
    .warranty-form {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: var(--radius-xl);
      padding: var(--spacing-xl);
      box-shadow: var(--shadow-xl);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .form-section {
      margin-bottom: var(--spacing-xl);
      position: relative;
    }

    .form-section:last-child {
      margin-bottom: 0;
    }

    .section-title {
      background: linear-gradient(135deg, var(--primary-600), var(--primary-800));
      color: white;
      padding: var(--spacing-md) var(--spacing-lg);
      font-size: 1.125rem;
      font-weight: 600;
      border-radius: var(--radius-lg);
      margin: 0 0 var(--spacing-lg) 0;
      display: flex;
      align-items: center;
      gap: var(--gap-md);
      box-shadow: var(--shadow-md);
      position: relative;
      overflow: hidden;
    }

    .section-title::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--secondary-500);
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: var(--gap-lg);
      margin-bottom: var(--spacing-lg);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .form-group.full-width {
      grid-column: 1 / -1;
    }

    .form-label {
      color: var(--white);
      font-size: 12px;
      font-weight: bold;
      font-family: Arial, sans-serif;
      margin-bottom: 5px;
      background: var(--secondary-orange);
      padding: 8px 12px;
      text-transform: uppercase;
      border: none;
    }

    .form-label::after {
      content: '';
      width: 4px;
      height: 4px;
      background: var(--secondary-500);
      border-radius: 50%;
    }

    .form-input, .form-textarea {
      background: white;
      border: 2px solid var(--neutral-300);
      padding: 0.875rem 1rem;
      font-size: 0.9375rem;
      font-family: inherit;
      border-radius: var(--radius-lg);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      color: var(--neutral-900);
      font-weight: 500;
    }

    .form-input:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--primary-500);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      transform: translateY(-2px);
    }

    .form-input:hover, .form-textarea:hover {
      border-color: var(--neutral-300);
    }

    .form-textarea {
      resize: vertical;
      min-height: 120px;
      font-family: inherit;
    }

    /* Modern Section Styling */
    .top-section, .bottom-section {
      background: linear-gradient(135deg, var(--primary-50), var(--primary-100));
      padding: 1.5rem;
      border-radius: var(--radius-lg);
      border: 1px solid var(--primary-200);
      position: relative;
      overflow: hidden;
    }

    .top-section::before, .bottom-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary-500), var(--secondary-500));
    }

    /* Modern Buttons */
    .form-buttons {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--neutral-200);
    }

    .btn {
      padding: 0.875rem 2rem;
      border: none;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border-radius: var(--radius-lg);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
      letter-spacing: 0.025em;
      min-width: 140px;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn:active::before {
      width: 300px;
      height: 300px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary-600), var(--primary-700));
      color: white;
      box-shadow: var(--shadow-md);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--primary-700), var(--primary-800));
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .btn-secondary {
      background: linear-gradient(135deg, var(--neutral-500), var(--neutral-600));
      color: white;
      box-shadow: var(--shadow-md);
    }

    .btn-secondary:hover {
      background: linear-gradient(135deg, var(--neutral-600), var(--neutral-700));
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    /* Modern Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .form-section {
      animation: slideIn 0.6s ease-out;
      animation-fill-mode: both;
    }

    .form-section:nth-child(1) { animation-delay: 0.1s; }
    .form-section:nth-child(2) { animation-delay: 0.2s; }
    .form-section:nth-child(3) { animation-delay: 0.3s; }
    .form-section:nth-child(4) { animation-delay: 0.4s; }

    /* Modern Notification System */
    .notification {
      position: fixed;
      top: 2rem;
      right: 2rem;
      padding: 1rem 1.5rem;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-xl);
      z-index: 1000;
      font-weight: 600;
      font-family: inherit;
      animation: slideInRight 0.3s ease-out;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: 300px;
    }

    .notification::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .notification-success {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
    }

    .notification-success::before {
      background: white;
    }

    .notification-error {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
    }

    .notification-error::before {
      background: white;
    }

    .notification-info {
      background: linear-gradient(135deg, #06b6d4, #0891b2);
      color: white;
    }

    .notification-info::before {
      background: white;
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(100px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .form-container {
        padding: 1rem;
      }
      
      .form-header {
        flex-direction: column;
        gap: 1.5rem;
        text-align: center;
        padding: 1.5rem;
      }
      
      .header-info {
        align-items: center;
        gap: 1rem;
      }
      
      .form-row {
        grid-template-columns: 1fr;
        gap: 1rem;
      }
      
      .form-buttons {
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
      
      .btn {
        width: 100%;
        max-width: 300px;
      }
      
      .notification {
        right: 1rem;
        left: 1rem;
        min-width: auto;
      }
    }

    /* Dark mode support */
    @media (prefers-color-scheme: dark) {
      :root {
        --neutral-50: #171717;
        --neutral-100: #262626;
        --neutral-200: #404040;
        --neutral-300: #525252;
        --neutral-400: #737373;
        --neutral-500: #a3a3a3;
        --neutral-600: #d4d4d4;
        --neutral-700: #e5e5e5;
        --neutral-800: #f5f5f5;
        --neutral-900: #fafafa;
      }
      
      body {
        background: linear-gradient(135deg, var(--neutral-900) 0%, var(--neutral-800) 100%);
      }
      
      .form-header, .warranty-form {
        background: rgba(30, 41, 59, 0.9);
        border-color: rgba(255, 255, 255, 0.1);
      }
    }
  </style>
</head>
<body>

  <div class="form-container">
    <!-- HEADER -->
    <div class="form-header">
      <div class="logo-section">
        <div class="logo">
          <svg width="48" height="48" viewBox="0 0 32 32" fill="none">
            <rect width="32" height="32" rx="8" fill="#1B4F9C"/>
            <path d="M8 16L14 22L24 10" stroke="#F7B24B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="brand-name">SEKUNET</span>
        </div>
        <div class="header-info">
          <div class="date-info">
            <span class="date-label">FECHA:</span>
            <span class="date-value">1 de abril de 2026</span>
          </div>
          <div class="consecutive-info">
            <span class="consecutive-label">BOLETA:</span>
            <span class="consecutive-value">202603-006</span>
          </div>
        </div>
      </div>
    </div>

    <h1 class="form-title">FORMULARIO DE GARANTÍAS</h1>

    <!-- FORM CONTENT -->
    <form class="warranty-form" id="warrantyForm">
      <!-- TOP SECTION -->
      <div class="form-section top-section">
        <h2 class="section-title">DATOS DEL FORMULARIO</h2>
        <div class="form-row">
          <div class="form-group">
            <label for="tipo" class="form-label">TIPO:</label>
            <input type="text" id="tipo" name="tipo" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="categoria" class="form-label">CATEGORIA</label>
            <input type="text" id="categoria" name="categoria" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="motivo" class="form-label">MOTIVO</label>
            <input type="text" id="motivo" name="motivo" class="form-input" required>
          </div>
        </div>
      </div>

      <!-- CLIENT INFORMATION -->
      <div class="form-section">
        <h2 class="section-title">INFORMACIÓN DEL CLIENTE</h2>
        <div class="form-row">
          <div class="form-group">
            <label for="ticket" class="form-label">TICKET N°:</label>
            <input type="text" id="ticket" name="ticket" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="sede" class="form-label">SEDE</label>
            <input type="text" id="sede" name="sede" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="nombre" class="form-label">NOMBRE:</label>
            <input type="text" id="nombre" name="nombre" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="factura" class="form-label">FACTURA N°:</label>
            <input type="text" id="factura" name="factura" class="form-input" required>
          </div>
        </div>
      </div>

      <!-- PRODUCT INFORMATION -->
      <div class="form-section">
        <h2 class="section-title">INFORMACIÓN DEL PRODUCTO</h2>
        <div class="form-row">
          <div class="form-group">
            <label for="cantidad" class="form-label">CANTIDAD:</label>
            <input type="number" id="cantidad" name="cantidad" class="form-input" min="1" required>
          </div>
          <div class="form-group">
            <label for="fechaCompra" class="form-label">FECHA DE COMPRA</label>
            <input type="date" id="fechaCompra" name="fechaCompra" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="marca" class="form-label">MARCA:</label>
            <input type="text" id="marca" name="marca" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="codigo" class="form-label">CÓDIGO DE ARTÍCULO</label>
            <input type="text" id="codigo" name="codigo" class="form-input" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="serie" class="form-label">SERIE:</label>
            <input type="text" id="serie" name="serie" class="form-input">
          </div>
          <div class="form-group full-width">
            <label for="descripcion" class="form-label">DESCRIPCIÓN</label>
            <textarea id="descripcion" name="descripcion" class="form-textarea" rows="3" required></textarea>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group full-width">
            <label for="falla" class="form-label">FALLA</label>
            <textarea id="falla" name="falla" class="form-textarea" rows="3" required></textarea>
          </div>
        </div>
      </div>

      <!-- BOTTOM SECTION -->
      <div class="form-section bottom-section">
        <h2 class="section-title">AUTORIZACIÓN</h2>
        <div class="form-row">
          <div class="form-group">
            <label for="solicitado" class="form-label">SOLICITADO POR:</label>
            <input type="text" id="solicitado" name="solicitado" class="form-input" required>
          </div>
          <div class="form-group">
            <label for="aprobado" class="form-label">APROBADO POR:</label>
            <input type="text" id="aprobado" name="aprobado" class="form-input" value="Jorge Montenegro" required>
          </div>
        </div>
      </div>

      <!-- BUTTONS -->
      <div class="form-buttons">
        <button type="submit" class="btn btn-primary">GUARDAR</button>
        <button type="button" class="btn btn-secondary" id="clearBtn">LIMPIAR</button>
      </div>
    </form>
  </div>

  <script>
    // Formulario de Garantías JavaScript
    document.addEventListener('DOMContentLoaded', function() {
      // Initialize form
      initializeForm();
      
      // Set up event listeners
      setupEventListeners();
    });

    function initializeForm() {
      // Set current date
      setCurrentDate();
      
      // Generate consecutive number
      generateConsecutiveNumber();
    }

    function setCurrentDate() {
      const dateElement = document.getElementById('currentDate');
      const today = new Date();
      const options = { year: 'numeric', month: 'long', day: 'numeric' };
      const formattedDate = today.toLocaleDateString('es-ES', options);
      dateElement.textContent = formattedDate;
    }

    function generateConsecutiveNumber() {
      const consecutiveElement = document.getElementById('consecutiveNumber');
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, '0');
      
      // Generate random 3-digit number
      const randomNum = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
      
      // Format: YYYYMM-XXX
      const consecutive = `${year}${month}-${randomNum}`;
      consecutiveElement.textContent = consecutive;
    }

    function setupEventListeners() {
      const form = document.getElementById('warrantyForm');
      const clearBtn = document.getElementById('clearBtn');
      
      // Form submission
      form.addEventListener('submit', handleFormSubmit);
      
      // Clear button
      clearBtn.addEventListener('click', clearForm);
    }

    function handleFormSubmit(e) {
      e.preventDefault();
      
      const form = e.target;
      const submitBtn = form.querySelector('button[type="submit"]');
      
      // Validate all fields
      if (!validateForm()) {
        showNotification('Por favor, complete todos los campos requeridos', 'error');
        return;
      }
      
      // Show loading state
      submitBtn.textContent = 'GUARDANDO...';
      submitBtn.disabled = true;
      
      // Get form data
      const formData = getFormData();
      
      // Simulate saving to database
      setTimeout(() => {
        console.log('Form data:', formData);
        showNotification('Formulario guardado exitosamente', 'success');
        clearForm();
        generateConsecutiveNumber(); // Generate new consecutive number
        
        // Reset button
        submitBtn.textContent = 'GUARDAR';
        submitBtn.disabled = false;
      }, 1500);
    }

    function validateForm() {
      const form = document.getElementById('warrantyForm');
      const requiredFields = form.querySelectorAll('[required]');
      let isValid = true;
      
      requiredFields.forEach(field => {
        if (!field.value.trim()) {
          isValid = false;
          field.style.borderColor = '#ef4444';
        } else {
          field.style.borderColor = '#1e40af';
        }
      });
      
      return isValid;
    }

    function getFormData() {
      const form = document.getElementById('warrantyForm');
      const formData = new FormData(form);
      const data = {};
      
      // Add metadata
      data.fecha_creacion = new Date().toISOString();
      data.consecutivo = document.getElementById('consecutiveNumber').textContent;
      data.fecha_formulario = document.getElementById('currentDate').textContent;
      
      // Convert FormData to object
      for (let [key, value] of formData.entries()) {
        data[key] = value;
      }
      
      return data;
    }

    function clearForm() {
      const form = document.getElementById('warrantyForm');
      form.reset();
      
      // Reset field colors
      const inputs = form.querySelectorAll('.form-input, .form-textarea');
      inputs.forEach(input => {
        input.style.borderColor = '#1e40af';
      });
      
      // Keep approved by value
      const aprobadoInput = document.getElementById('aprobado');
      if (aprobadoInput) {
        aprobadoInput.value = 'Jorge Montenegro';
      }
      
      showNotification('Formulario limpiado', 'info');
    }

    function showNotification(message, type = 'info') {
      // Remove existing notifications
      const existingNotification = document.querySelector('.notification');
      if (existingNotification) {
        existingNotification.remove();
      }
      
      // Create notification element
      const notification = document.createElement('div');
      notification.className = `notification notification-${type}`;
      notification.textContent = message;
      
      // Style notification
      const colors = {
        success: { bg: '#10b981', text: 'white' },
        error: { bg: '#ef4444', text: 'white' },
        info: { bg: '#3b82f6', text: 'white' }
      };
      
      notification.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        background: ${colors[type].bg};
        color: ${colors[type].text};
        padding: 12px 20px;
        border-radius: 4px;
        z-index: 1000;
        font-weight: bold;
        font-family: Arial, sans-serif;
      `;
      
      document.body.appendChild(notification);
      
      // Auto remove after 3 seconds
      setTimeout(() => {
        if (notification.parentNode) {
          notification.remove();
        }
      }, 3000);
    }
  </script>
</body>
</html>
