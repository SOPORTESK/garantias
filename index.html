<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro de Garantías · Sekunet</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --sekunet-blue: #1B4F9C;
      --sekunet-amber: #F7B24B;
      --text-dark: #2d3748;
      --bg-gray: #f1f5f9;
      --border-color: #cbd5e1;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg-gray);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    .form-sheet {
      background: white;
      width: 100%;
      max-width: 1100px;
      padding: 40px;
      border: 1px solid var(--border-color);
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      border-radius: 4px; /* Estilo hoja técnica */
    }

    /* HEADER */
    .header-table {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .brand-section img { height: 60px; } /* Aquí iría tu logo */
    
    .title-section { text-align: center; flex: 1; }
    .title-section h1 { 
      font-family: 'Syne', sans-serif; 
      color: var(--sekunet-blue); 
      margin: 0; 
      font-size: 28px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .meta-info { font-size: 14px; color: var(--text-dark); }
    .consecutivo-box {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }
    .label-amber-small {
      background: var(--sekunet-amber);
      color: var(--sekunet-blue);
      font-weight: bold;
      padding: 4px 12px;
      font-size: 12px;
      border-radius: 2px;
    }

    /* GRID SISTEMA */
    .section-title {
      text-align: center;
      font-weight: 800;
      color: var(--text-dark);
      border-bottom: 2px solid var(--sekunet-blue);
      margin: 25px 0 15px 0;
      padding-bottom: 5px;
      text-transform: uppercase;
      font-size: 16px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 10px;
      margin-bottom: 8px;
    }

    .input-group {
      display: flex;
      align-items: stretch;
      border: 1px solid var(--sekunet-blue);
      border-radius: 3px;
      overflow: hidden;
    }

    .label-amber {
      background: var(--sekunet-amber);
      color: var(--sekunet-blue);
      font-weight: 700;
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      min-width: 100px;
      text-align: center;
      text-transform: uppercase;
    }

    input, select, textarea {
      flex: 1;
      border: none;
      padding: 8px 12px;
      font-size: 13px;
      outline: none;
      color: var(--text-dark);
    }

    textarea { resize: vertical; }

    /* FOOTER / BUTTONS */
    .footer-actions {
      margin-top: 40px;
      display: flex;
      gap: 0;
    }

    .btn {
      flex: 1;
      padding: 15px;
      border: 1px solid var(--sekunet-blue);
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.3s;
      font-family: 'Syne', sans-serif;
    }

    .btn-save { background: var(--sekunet-blue); color: white; }
    .btn-save:hover { background: #133a75; }

    .btn-clear { background: white; color: var(--sekunet-blue); }
    .btn-clear:hover { background: #f8fafc; }

    /* Responsive */
    .col-6 { grid-column: span 6; }
    .col-4 { grid-column: span 4; }
    .col-3 { grid-column: span 3; }
    .col-12 { grid-column: span 12; }

  </style>
</head>
<body>

  <div class="form-sheet">
    <div class="header-table">
      <div class="brand-section">
        <div style="font-family:'Syne'; font-weight:800; color:var(--sekunet-blue); font-size:32px;">SEKUNET</div>
      </div>
      <div class="title-section">
        <h1>Formulario de Garantías</h1>
        <div id="currentDate" style="margin-top:10px; font-weight:bold;"></div>
      </div>
      <div class="meta-info">
        <div class="consecutivo-box">
          <span class="label-amber-small">CONSECUTIVO:</span>
          <span style="font-family:monospace; font-weight:bold;" id="folio">202604-001</span>
        </div>
      </div>
    </div>

    <form id="garantiaForm">
      <div class="row">
        <div class="input-group col-3">
          <div class="label-amber">Tipo</div>
          <select id="tipo">
            <option value="definitiva">Definitiva</option>
            <option value="temporal">Temporal</option>
          </select>
        </div>
        <div class="input-group col-3">
          <div class="label-amber">Categoría</div>
          <input type="text" id="categoria">
        </div>
        <div class="input-group col-3">
          <div class="label-amber">Boleta Nº</div>
          <input type="text" id="boleta_no">
        </div>
        <div class="input-group col-3">
          <div class="label-amber">Motivo</div>
          <input type="text" id="motivo">
        </div>
      </div>

      <div class="section-title">Información del Cliente</div>
      <div class="row">
        <div class="input-group col-4">
          <div class="label-amber">Ticket Nº</div>
          <input type="text" id="ticket_no">
        </div>
        <div class="input-group col-8">
          <div class="label-amber">Sede</div>
          <input type="text" id="sede">
        </div>
      </div>
      <div class="row">
        <div class="input-group col-8">
          <div class="label-amber">Nombre</div>
          <input type="text" id="nombre_cliente">
        </div>
        <div class="input-group col-4">
          <div class="label-amber">Factura Nº</div>
          <input type="text" id="factura_no">
        </div>
      </div>

      <div class="section-title">Información del Producto</div>
      <div class="row">
        <div class="input-group col-3">
          <div class="label-amber">Cantidad</div>
          <input type="number" id="cantidad">
        </div>
        <div class="input-group col-9">
          <div class="label-amber">Fecha de Compra</div>
          <input type="date" id="fecha_compra">
        </div>
      </div>
      <div class="row">
        <div class="input-group col-4">
          <div class="label-amber">Marca</div>
          <input type="text" id="marca">
        </div>
        <div class="input-group col-4">
          <div class="label-amber">Código Artículo</div>
          <input type="text" id="codigo_articulo">
        </div>
        <div class="input-group col-4">
          <div class="label-amber">Serie</div>
          <input type="text" id="serie">
        </div>
      </div>

      <div class="section-title">Detalle Técnico</div>
      <div class="row">
        <div class="input-group col-12">
          <div class="label-amber" style="min-width: 140px;">Descripción</div>
          <textarea id="descripcion" rows="3"></textarea>
        </div>
      </div>
      <div class="row">
        <div class="input-group col-12">
          <div class="label-amber" style="min-width: 140px;">Falla</div>
          <textarea id="falla" rows="3"></textarea>
        </div>
      </div>

      <div class="row" style="margin-top: 20px;">
        <div class="input-group col-6">
          <div class="label-amber">Solicitado Por</div>
          <input type="text" id="solicitado_por">
        </div>
        <div class="input-group col-6">
          <div class="label-amber">Aprobado Por</div>
          <input type="text" id="aprobado_por" value="Jorge Montenegro" readonly>
        </div>
      </div>

      <div class="footer-actions">
        <button type="button" class="btn btn-clear" onclick="window.location.href='index.html'">LIMPIAR / VOLVER</button>
        <button type="submit" class="btn btn-save">GUARDAR REGISTRO</button>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // CONFIGURACIÓN SUPABASE
    const supabaseUrl = 'https://TU_PROYECTO.supabase.co';
    const supabaseKey = 'TU_ANON_KEY';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    // FECHA ACTUAL
    document.getElementById('currentDate').textContent = new Date().toLocaleDateString('es-ES', {
      day: 'numeric', month: 'long', year: 'numeric'
    });

    // LÓGICA DE ENVÍO
    const form = document.getElementById('garantiaForm');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const payload = {
        tipo: document.getElementById('tipo').value,
        categoria: document.getElementById('categoria').value,
        boleta_no: document.getElementById('boleta_no').value,
        motivo: document.getElementById('motivo').value,
        ticket_no: document.getElementById('ticket_no').value,
        sede: document.getElementById('sede').value,
        nombre_cliente: document.getElementById('nombre_cliente').value,
        factura_no: document.getElementById('factura_no').value,
        cantidad: document.getElementById('cantidad').value,
        fecha_compra: document.getElementById('fecha_compra').value,
        marca: document.getElementById('marca').value,
        codigo_articulo: document.getElementById('codigo_articulo').value,
        serie: document.getElementById('serie').value,
        descripcion: document.getElementById('descripcion').value,
        falla: document.getElementById('falla').value,
        solicitado_por: document.getElementById('solicitado_por').value,
        aprobado_por: document.getElementById('aprobado_por').value,
        estado: 'pendiente'
      };

      const { data, error } = await supabase.from('registros').insert([payload]);

      if (error) {
        alert("Error: " + error.message);
      } else {
        alert("Formulario Guardado Exitosamente");
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
